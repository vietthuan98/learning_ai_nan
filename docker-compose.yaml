services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    # The model is pre-downloaded in the Dockerfile, so we don't strictly 
    # need a volume here unless you want to persist additional models.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "32123:32123"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
